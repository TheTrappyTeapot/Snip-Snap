{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block styles %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/login.css') }}">
{% endblock %}

{% block content %}
<div class="login-page">
  <section class="login-card">
    <div class="login-card__header">
      <h1 class="login-card__title">Login</h1>
      <p class="login-card__subtitle">Sign in to continue to Snip-Snap.</p>
    </div>

    <form id="loginForm" class="login-form">
      <div class="login-field">
        <label class="login-label" for="email">Email</label>
        <input class="login-input" id="email" type="email" required autocomplete="email" placeholder="your@email.com">
        <p id="emailError" class="field-error"></p>
      </div>

      <div class="login-field">
        <label class="login-label" for="password">Password</label>
        <input class="login-input" id="password" type="password" required autocomplete="current-password" placeholder="Your password">
        <p id="passwordError" class="field-error"></p>
      </div>

      <div class="login-field">
        <p id="generalError" class="field-error"></p>
      </div>

      <div class="login-actions">
        <button class="login-btn login-btn--primary" id="submitBtn" type="submit">Sign in</button>
      </div>
    </form>

    <div class="login-divider">or</div>

    <button id="googleBtn" class="login-btn login-btn--secondary" type="button">
      Login with Google
    </button>

    <p id="msg" class="login-message"></p>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script 
  src="{{ url_for('static', filename='js/pages/login.js') }}"
  data-supabase-url="{{ supabase_url|e }}"
  data-supabase-anon-key="{{ supabase_anon_key|e }}"
></script>
{% endblock %}
