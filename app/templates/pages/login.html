{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<h1>Login</h1>

<form id="loginForm">
  <label>Email<br><input id="email" type="email" required autocomplete="email"></label><br><br>
  <label>Password<br><input id="password" type="password" required autocomplete="current-password"></label><br><br>
  <button type="submit">Sign in</button>
</form>

<hr>

<button id="googleBtn" type="button">Login with Google</button>

<p id="msg" style="margin-top:12px;"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "{{ supabase_url|e }}";
  const SUPABASE_ANON_KEY = "{{ supabase_anon_key|e }}";

  // Prevent “already declared” if script is included twice for any reason
  window.__sb__ = window.__sb__ || window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const sb = window.__sb__;

  const msg = document.getElementById("msg");

  async function postTokenToFlask(access_token) {
    console.log("Posting token to Flask:", access_token ? "Token exists" : "No token");

    const res = await fetch("{{ url_for('auth_callback') }}", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ access_token }),
    });

    const json = await res.json();
    console.log("Auth callback response:", json);

    if (!json.ok) {
      msg.textContent = "Server auth failed: " + (json.error || "unknown error");
      throw new Error(json.error || "Auth callback failed");
    }
  }

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    msg.textContent = "Signing in…";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    console.log("Attempting Supabase login for:", email);

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    console.log("Supabase response:", data, error);

    if (error) {
      msg.textContent = error.message;
      return;
    }

    if (!data.session) {
      msg.textContent = "No session returned.";
      console.log("No session returned!");
      return;
    }

    await postTokenToFlask(data.session.access_token);

    console.log("Redirecting to discover…");
    window.location.href = "{{ url_for('discover') }}";
  });
</script>
{% endblock %}
