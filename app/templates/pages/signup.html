{% extends "base.html" %}
{% block title %}Sign up{% endblock %}

{% block styles %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/signin.css') }}">
{% endblock %}

{% block content %}
<div class="login-page">
  <section class="login-card">
    <div class="login-card__header">
      <h1 class="login-card__title">Sign up</h1>
      <p class="login-card__subtitle">Create your account to continue.</p>
    </div>

    <form id="signupForm" class="login-form">
      <div class="login-field">
        <label class="login-label" for="username">Username</label>
        <input class="login-input" id="username" type="text" required autocomplete="username" placeholder="Choose a username">
        <p id="usernameError" class="field-error"></p>
      </div>

      <div class="login-field">
        <label class="login-label" for="email">Email</label>
        <input class="login-input" id="email" type="email" required autocomplete="email" placeholder="your@email.com">
        <p id="emailError" class="field-error"></p>
      </div>

      <div class="login-field">
        <label class="login-label" for="password">Password</label>
        <input class="login-input" id="password" type="password" required autocomplete="new-password" placeholder="At least 6 characters">
        <p id="passwordError" class="field-error"></p>
      </div>

      <div class="login-field">
        <p id="generalError" class="field-error"></p>
      </div>

      <div class="login-actions">
        <button class="login-btn login-btn--primary" id="submitBtn" type="submit">Create account</button>
      </div>
    </form>

    <div class="login-divider">or</div>

    <button id="googleBtn" class="login-btn login-btn--secondary" type="button">Sign up with Google</button>

    <p id="msg" class="login-message"></p>
  </section>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script 
  src="{{ url_for('static', filename='js/pages/signup.js') }}"
  data-supabase-url="{{ supabase_url|e }}"
  data-supabase-anon-key="{{ supabase_anon_key|e }}"
></script>
{% endblock %}
