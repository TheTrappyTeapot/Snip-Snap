{% extends "base.html" %}
{% block title %}Sign up{% endblock %}

{% block styles %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/signin.css') }}">
{% endblock %}

{% block content %}
<div class="login-page">
  <section class="login-card">
    <div class="login-card__header">
      <h1 class="login-card__title">Sign up</h1>
      <p class="login-card__subtitle">Create your account to continue.</p>
    </div>

    <form id="signupForm" class="login-form">
      <div class="login-field">
        <label class="login-label" for="email">Email</label>
        <input class="login-input" id="email" type="email" required autocomplete="email">
      </div>

      <div class="login-field">
        <label class="login-label" for="password">Password</label>
        <input class="login-input" id="password" type="password" required autocomplete="new-password">
      </div>

      <div class="login-actions">
        <button class="login-btn login-btn--primary" type="submit">Create account</button>
      </div>
    </form>

    <div class="login-divider">or</div>

    <button id="googleBtn" class="login-btn login-btn--secondary" type="button">Sign up with Google</button>

    <p id="msg" class="login-message"></p>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "{{ supabase_url|e }}";
  const SUPABASE_ANON_KEY = "{{ supabase_anon_key|e }}";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const msg = document.getElementById("msg");

  async function postTokenToFlask(access_token) {
    const res = await fetch("{{ url_for('auth_callback') }}", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ access_token }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || "Auth callback failed");
  }

  document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    msg.textContent = "Creating account…";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const { data, error } = await supabase.auth.signUp({ email, password });
    if (error) { msg.textContent = error.message; return; }

    if (data.session?.access_token) {
      await postTokenToFlask(data.session.access_token);
      window.location.href = "{{ url_for('discover') }}";
    } else {
      msg.textContent = "Check your email to confirm your account, then log in.";
    }
  });

  document.getElementById("googleBtn").addEventListener("click", async () => {
    msg.textContent = "Redirecting to Google…";
    await supabase.auth.signInWithOAuth({
      provider: "google",
      options: {
        redirectTo: window.location.origin + "{{ url_for('auth_redirect') }}",
      },
    });
  });
</script>
{% endblock %}
