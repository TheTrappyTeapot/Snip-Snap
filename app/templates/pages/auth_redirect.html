{# Template for /home/runner/work/Snip-Snap/Snip-Snap/app/templates/pages/auth_redirect.html. #}

<!doctype html>
<html lang="en-GB">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
  <body>
    <p>Finishing sign-in…</p>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "{{ supabase_url|e }}";
      const SUPABASE_ANON_KEY = "{{ supabase_anon_key|e }}";
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      async function run() {
        const { data, error } = await supabase.auth.getSession();
        if (error || !data.session) {
          document.body.innerText = "Could not establish session. Try logging in again.";
          return;
        }
//send access token to flask endpoint 
        const res = await fetch("{{ url_for('auth_callback') }}", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ access_token: data.session.access_token }),
        });
//if token was rejected, display error and stop 
        const json = await res.json();
        if (!json.ok) {
          document.body.innerText = "Server auth failed: " + (json.error || "unknown error");
          return;
        }
//if token was successful user is redirected
        window.location.href = "{{ url_for('discover') }}";
      }

      run();
    </script>
  </body>
</html>
