{% extends "base.html" %}
{% block content %}
  <h1>Barber Dashboard</h1>
  {% if user_id %}
    <div class="js-user-promo" data-user-id="{{ user_id }}"></div>
  {% endif %}

  {% if errors %}
    <ul>
      {% for error in errors %}
        <li>{{ error }}</li>
      {% endfor %}
    </ul>
  {% endif %}

  {% if success %}
    <p>{{ success }}</p>
  {% endif %}

  <form action="{{ url_for('upload_post') }}" method="post" enctype="multipart/form-data">
    <label for="photo">Photo *</label>
    <input id="photo" name="photo" type="file" accept=".jpg,.jpeg,.png,.webp" required>

    <label for="tags">Tags (optional)</label>
    <input
      id="tags"
      name="tags"
      type="text"
      value="{{ form_data.tags if form_data else '' }}"
      placeholder="e.g. 1,2,9"
    >

    <button type="submit">Upload Post</button>
  </form>
{% endblock %}
