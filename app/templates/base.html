<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "SnipSnap" }}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/searchAutocomplete.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/galleryGrid.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/postImageCard.css') }}">
    
    {% block head_extra %}{% endblock %}
  </head>

  <body>
    <header class="site-header">
      <nav class="nav">
        <a href="{{ url_for('welcome') }}">Welcome Page</a>
        <a href="{{ url_for('discover') }}">Discover Page</a>
        <a href="{{ url_for('map_page') }}">Map</a>
        <a href="{{ url_for('barber_dashboard') }}">Barber Dashboard</a>
      </nav>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/components/searchAutocomplete.js') }}"></script>

    {% block scripts %}{% endblock %}
  </body>
</html>
