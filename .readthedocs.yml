# ReadTheDocs Configuration File
# https://docs.readthedocs.io/en/stable/config-file/v2/

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

python:
  version: 3.11
  install:
    - requirements: requirements.txt
    - requirements: docs/requirements.txt

sphinx:
  configuration: docs/conf.py

formats:
  - pdf
  - epub

# Redirects
redirects:
  index.html: source/index.html
